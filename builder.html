<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageForge — Build a Landing Page in Seconds</title>
  <style>
    body {
      background: #050510;
      color: #e0f2fe;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 700px;
      width: 100%;
    }
    h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #22d3ee, #e879f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }
    textarea {
      width: 100%;
      padding: 15px;
      background: #0a0a1a;
      color: #e0f2fe;
      border: 1px solid #22d3ee33;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      min-height: 100px;
      resize: vertical;
    }
    .btn {
      padding: 12px 30px;
      background: #e879f9;
      color: #050510;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 10px;
    }
    .btn:hover {
      background: #22d3ee;
    }
    #preview {
      margin-top: 20px;
      width: 100%;
      border: 1px solid #22d3ee33;
      border-radius: 8px;
      background: #ffffff;
      min-height: 300px;
      display: none;
    }
    .loading {
      color: #22d3ee;
      text-align: center;
      display: none;
    }
    .download-btn {
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>⚡ PageForge</h1>
  <p style="text-align: center; color: #94a3b8;">Describe your landing page — Vic builds it live.</p>

  <textarea id="prompt" placeholder="e.g., Landing page for a plumber in London. Include hero, services, testimonials, and a contact button."></textarea>
  <button class="btn" onclick="generatePage()">Build Page</button>

  <div class="loading" id="loading">⏳ Vic is building your page...</div>
  <iframe id="preview"></iframe>
  <button class="btn download-btn" id="downloadBtn" onclick="downloadPage()">⬇ Download Page</button>
</div>

<script>
  function generatePage() {
    const prompt = document.getElementById('prompt').value;
    if (!prompt) {
      alert('Please describe your landing page.');
      return;
    }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('preview').style.display = 'none';
    document.getElementById('downloadBtn').style.display = 'none';

    // Call Vic's API to generate the page
    fetch('https://vic.a.pinggy.link/v1/generate-page', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-API-Key': 'vic-free-key-2025'
      },
      body: JSON.stringify({ prompt: prompt })
    })
    .then(response => response.json())
    .then(data => {
      document.getElementById('loading').style.display = 'none';
      if (data.html) {
        const preview = document.getElementById('preview');
        preview.style.display = 'block';
        preview.srcdoc = data.html;
        document.getElementById('downloadBtn').style.display = 'inline-block';
        window.generatedHTML = data.html;
      } else {
        alert('❌ Failed to generate page. Please try again.');
      }
    })
    .catch(error => {
      document.getElementById('loading').style.display = 'none';
      alert('❌ Error: ' + error.message);
    });
  }

  function downloadPage() {
    if (!window.generatedHTML) return;
    const blob = new Blob([window.generatedHTML], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'landing-page.html';
    a.click();
    URL.revokeObjectURL(url);
  }
</script>

</body>
</html>
