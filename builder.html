<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PageForge — Build a Landing Page</title>
    <style>
        body { 
            background: #050510; 
            color: #e0f2fe; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 800px; 
            width: 100%; 
        }
        h1 { 
            font-size: 3rem; 
            background: linear-gradient(135deg, #22d3ee, #e879f9); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-align: center; 
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center; 
            color: #94a3b8; 
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            color: #e0f2fe; 
            margin-bottom: 8px; 
            font-size: 1.1rem; 
            font-weight: bold;
        }
        input, textarea { 
            width: 100%; 
            padding: 14px; 
            background: #0a0a1a; 
            color: #e0f2fe; 
            border: 1px solid #22d3ee33; 
            border-radius: 8px; 
            font-family: inherit; 
            font-size: 1.05rem; 
            box-sizing: border-box; 
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #e879f9;
            box-shadow: 0 0 10px rgba(232, 121, 249, 0.2);
        }
        textarea { 
            min-height: 100px; 
            resize: vertical; 
        }
        .btn { 
            padding: 16px 30px; 
            background: #e879f9; 
            color: #050510; 
            font-weight: bold; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.2rem; 
            margin-top: 15px; 
            width: 100%; 
            transition: 0.3s;
        }
        .btn:hover { 
            background: #22d3ee; 
            transform: scale(1.02);
        }
        #preview { 
            margin-top: 20px; 
            width: 100%; 
            border: 2px solid #22d3ee33; 
            border-radius: 8px; 
            background: #ffffff; 
            min-height: 400px; 
            display: none; 
        }
        .loading { 
            color: #22d3ee; 
            text-align: center; 
            display: none; 
            font-size: 1.2rem;
            padding: 20px;
        }
        .download-btn { 
            margin-top: 15px; 
            display: none; 
            background: #22d3ee;
        }
        .download-btn:hover {
            background: #e879f9;
        }
        .row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }
        .required {
            color: #e879f9;
        }
        @media (max-width: 600px) { 
            .row { 
                grid-template-columns: 1fr; 
            }
            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ PageForge</h1>
    <p class="subtitle">Enter your business details — Vic builds a live landing page.</p>

    <div class="form-group">
        <label>Business Name <span class="required">*</span></label>
        <input id="business_name" placeholder="e.g., Plumber Kirkcaldy" />
    </div>

    <div class="form-group">
        <label>Location <span class="required">*</span></label>
        <input id="location" placeholder="e.g., Kirkcaldy, Scotland" />
    </div>

    <div class="form-group">
        <label>Phone Number <span class="required">*</span></label>
        <input id="phone" placeholder="e.g., 07777777777" />
    </div>

    <div class="form-group">
        <label>Services (one line)</label>
        <input id="services" placeholder="e.g., Emergency plumbing, boiler repairs, installations" />
    </div>

    <div class="form-group">
        <label>Business Description</label>
        <textarea id="description" placeholder="e.g., We are a trusted plumbing company serving Kirkcaldy and surrounding areas."></textarea>
    </div>

    <div class="row">
        <div class="form-group">
            <label>Email</label>
            <input id="email" placeholder="info@yourbusiness.com" />
        </div>
        <div class="form-group">
            <label>Website</label>
            <input id="website" placeholder="yourbusiness.com" />
        </div>
    </div>

    <div class="form-group">
        <label>Opening Hours</label>
        <input id="opening_hours" placeholder="Mon-Fri: 9am-5pm, Sat: 10am-2pm" />
    </div>

    <div class="row">
        <div class="form-group">
            <label>Facebook URL</label>
            <input id="social_facebook" placeholder="https://facebook.com/yourpage" />
        </div>
        <div class="form-group">
            <label>Twitter URL</label>
            <input id="social_twitter" placeholder="https://twitter.com/yourpage" />
        </div>
    </div>

    <div class="form-group">
        <label>Instagram URL</label>
        <input id="social_instagram" placeholder="https://instagram.com/yourpage" />
    </div>

    <div class="form-group">
        <label>Customer Testimonial</label>
        <textarea id="testimonial" placeholder='"They fixed my boiler in no time!"'></textarea>
    </div>

    <div class="form-group">
        <label>CTA Button Text</label>
        <input id="cta_text" placeholder="Get in Touch" value="Get in Touch" />
    </div>

    <button class="btn" onclick="generatePage()">🚀 Build Page</button>

    <div class="loading" id="loading">⏳ Vic is building your page...</div>
    <iframe id="preview"></iframe>
    <button class="btn download-btn" id="downloadBtn" onclick="downloadPage()">⬇ Download Landing Page</button>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');

  function showBuyPage() {
    document.body.innerHTML = `
      <div style="background:#050510;color:#e0f2fe;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;">
        <h1 style="font-size:2.5rem;background:linear-gradient(135deg,#22d3ee,#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">🔒 PageForge</h1>
        <p style="font-size:1.2rem;color:#94a3b8;">Please purchase PageForge to access the builder.</p>
        <a href="https://fixseo.gumroad.com/l/pageforge" style="display:inline-block;padding:16px 40px;background:#e879f9;color:#050510;font-weight:bold;border-radius:8px;text-decoration:none;font-size:1.2rem;margin-top:20px;">Buy Now — £29.99</a>
        <p style="color:#64748b;font-size:0.9rem;margin-top:10px;">One-time payment. Lifetime access.</p>
      </div>
    `;
  }

  function showInvalidToken() {
    document.body.innerHTML = `
      <div style="background:#050510;color:#e0f2fe;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;">
        <h1 style="font-size:2.5rem;color:#e879f9;">❌ Invalid Token</h1>
        <p style="font-size:1.2rem;color:#94a3b8;">This purchase token is not valid.</p>
        <a href="https://fixseo.gumroad.com/l/pageforge" style="display:inline-block;padding:16px 40px;background:#e879f9;color:#050510;font-weight:bold;border-radius:8px;text-decoration:none;font-size:1.2rem;margin-top:20px;">Buy Now</a>
      </div>
    `;
  }

  if (!token) {
    showBuyPage();
  } else {
    fetch('https://vic.a.pinggy.link/v1/validate-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token })
    })
    .then(response => response.json())
    .then(data => {
      if (!data.valid) {
        showInvalidToken();
      }
    })
    .catch(() => {
      showInvalidToken();
    });
  }

  // Only run this code if token exists (page hasn't been replaced)
  if (token) {
    if (urlParams.has('email')) {
        document.getElementById('email').value = urlParams.get('email');
    }
    if (urlParams.has('business_name')) {
        document.getElementById('business_name').value = urlParams.get('business_name');
    }
    if (urlParams.has('location')) {
        document.getElementById('location').value = urlParams.get('location');
    }
    if (urlParams.has('phone')) {
        document.getElementById('phone').value = urlParams.get('phone');
    }

    function generatePage() {
      const data = {
        business_name: document.getElementById('business_name').value || 'Your Business',
        location: document.getElementById('location').value || 'UK',
        phone: document.getElementById('phone').value || '01234 567890',
        services: document.getElementById('services').value || 'Professional services',
        description: document.getElementById('description').value || 'We provide high-quality services.',
        email: document.getElementById('email').value || 'info@yourbusiness.com',
        website: document.getElementById('website').value || 'yourbusiness.com',
        opening_hours: document.getElementById('opening_hours').value || 'Mon-Fri: 9am-5pm',
        social_facebook: document.getElementById('social_facebook').value,
        social_twitter: document.getElementById('social_twitter').value,
        social_instagram: document.getElementById('social_instagram').value,
        testimonial: document.getElementById('testimonial').value,
        cta_text: document.getElementById('cta_text').value || 'Get in Touch'
      };

      document.getElementById('loading').style.display = 'block';
      document.getElementById('preview').style.display = 'none';
      document.getElementById('downloadBtn').style.display = 'none';

      fetch('https://vic.a.pinggy.link/v1/generate-page', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-API-Key': 'vic-free-key-2025'
        },
        body: JSON.stringify(data)
      })
      .then(response => response.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        if (data.html) {
          const preview = document.getElementById('preview');
          preview.style.display = 'block';
          preview.srcdoc = data.html;
          localStorage.setItem('pageHTML', data.html);
          document.getElementById('downloadBtn').style.display = 'inline-block';
        } else {
          alert('Failed to generate page. Please try again.');
        }
      })
      .catch(error => {
        document.getElementById('loading').style.display = 'none';
        alert('Error: ' + error.message);
      });
    }

    function downloadPage() {
      var htmlContent = localStorage.getItem('pageHTML');
      
      if (!htmlContent) {
        alert('Please generate a page first by clicking "Build Page".');
        return;
      }
      
      try {
        var blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'landing-page.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function() {
          URL.revokeObjectURL(url);
        }, 100);
      } catch (e) {
        alert('Download failed: ' + e.message);
      }
    }
  }
</script>

</body>
</html>
